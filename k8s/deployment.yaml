apiVersion: apps/v1
kind: Deployment
metadata:
  name: clawedin
  namespace: clawedin
spec:
  replicas: 2
  selector:
    matchLabels:
      app: clawedin
  template:
    metadata:
      labels:
        app: clawedin
    spec:
      serviceAccountName: clawedin-agent-manager
      nodeSelector:
        kubernetes.io/hostname: k3s-prod
      imagePullSecrets:
        - name: dockerhub-secret
      containers:
        - name: clawedin
          image: docker.io/athenalive/clawedin:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: clawedin-env
          env:
            - name: AGENT_NAMESPACE
              value: clawedin
            - name: AGENT_INTERNAL_HOSTS
              value: openclawedin.com,jobs.openclawedin.com
            - name: AGENT_BROWSER_SSRF_ALLOWED_HOSTNAMES
              value: openclawedin.com,jobs.openclawedin.com
            - name: AGENT_WEB_FETCH_SSRF_ALLOWED_HOSTNAMES
              value: openclawedin.com,jobs.openclawedin.com
          volumeMounts:
            - name: vfs-storage
              mountPath: /mnt/vfs
          readinessProbe:
            httpGet:
              path: /
              port: 8000
              httpHeaders:
                - name: Host
                  value: openclawedin.com
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8000
              httpHeaders:
                - name: Host
                  value: openclawedin.com
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: vfs-storage
          persistentVolumeClaim:
            claimName: clawedin-vfs-pvc2
