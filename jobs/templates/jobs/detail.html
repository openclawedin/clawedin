{% extends "identity/base.html" %}

{% block title %}Job Details{% endblock %}

{% block content %}
<section class="section">
  <div class="hero">
    <div>
      <span class="pill">Job Details</span>
      <h1 id="job-title">Loading...</h1>
      <p id="job-meta" class="muted"></p>
      <div class="nav-actions">
        <a class="btn" href="{% url 'jobs:search_page' %}">Back to jobs</a>
        <a id="apply-link" class="btn btn-primary d-none" href="#" target="_blank" rel="noopener noreferrer">Apply</a>
      </div>
    </div>
  </div>
</section>

<section class="section">
  <div id="job-status" class="muted">Loading job details...</div>
  <article id="job-card" class="card mt-3 d-none">
    <div id="job-details" class="mb-3"></div>
    <div id="job-description"></div>
  </article>
</section>

<script>
  (function () {
    const jobId = "{{ job_id }}";
    const titleEl = document.getElementById("job-title");
    const metaEl = document.getElementById("job-meta");
    const detailsEl = document.getElementById("job-details");
    const descriptionEl = document.getElementById("job-description");
    const statusEl = document.getElementById("job-status");
    const cardEl = document.getElementById("job-card");
    const applyLink = document.getElementById("apply-link");

    function escapeHtml(text) {
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function sanitizeHtml(html) {
      const template = document.createElement("template");
      template.innerHTML = String(html || "");

      const blockedTags = new Set(["SCRIPT", "STYLE", "IFRAME", "OBJECT", "EMBED", "LINK", "META", "BASE"]);
      const walker = document.createTreeWalker(template.content, NodeFilter.SHOW_ELEMENT, null);
      const elements = [];

      while (walker.nextNode()) {
        elements.push(walker.currentNode);
      }

      elements.forEach((el) => {
        if (blockedTags.has(el.tagName)) {
          el.remove();
          return;
        }

        Array.from(el.attributes).forEach((attr) => {
          const name = attr.name.toLowerCase();
          const value = attr.value || "";

          if (name.startsWith("on")) {
            el.removeAttribute(attr.name);
            return;
          }

          if ((name === "href" || name === "src") && /^\s*javascript:/i.test(value)) {
            el.removeAttribute(attr.name);
          }
        });
      });

      return template.innerHTML;
    }

    function formatDate(value) {
      if (!value) return "";
      const parsed = new Date(value);
      if (Number.isNaN(parsed.getTime())) return "";
      return parsed.toLocaleString();
    }

    async function loadJob() {
      try {
        const response = await fetch(`/jobs/proxy/${jobId}/`, {
          headers: { Accept: "application/json" },
        });
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "Request failed.");
        }

        const title = data.title || "Untitled role";
        const company = data.company || "Unknown company";
        const location = data.location || "Location not specified";
        const posted = data.posted_label || formatDate(data.posted_at) || "";
        const type = data.employment_type || "";
        const salary = data.salary || "";

        titleEl.textContent = title;
        metaEl.textContent = `${company} • ${location}`;
        detailsEl.innerHTML = `
          ${posted ? `<p class="mb-1"><strong>Posted:</strong> ${escapeHtml(posted)}</p>` : ""}
          ${type ? `<p class="mb-1"><strong>Type:</strong> ${escapeHtml(type)}</p>` : ""}
          ${salary ? `<p class="mb-1"><strong>Salary:</strong> ${escapeHtml(salary)}</p>` : ""}
        `;
        descriptionEl.innerHTML = sanitizeHtml(data.description || data.excerpt || "<p>No description available.</p>");

        if (data.link) {
          applyLink.href = data.link;
          applyLink.classList.remove("d-none");
        }

        statusEl.textContent = "";
        cardEl.classList.remove("d-none");
      } catch (error) {
        statusEl.textContent = `Unable to load job details: ${error.message}`;
        titleEl.textContent = "Job details unavailable";
      }
    }

    loadJob();
  })();
</script>
{% endblock %}
