<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Server error</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #120d14;
      --panel: #201522;
      --text: #f4e9ef;
      --muted: #c7aebb;
      --accent: #fda4af;
      --line: rgba(199, 174, 187, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, rgba(253, 164, 175, 0.2), transparent 36%),
        linear-gradient(180deg, #12080c, var(--bg));
      color: var(--text);
      font-family: Arial, sans-serif;
    }

    main {
      width: min(100%, 720px);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 40px;
      background: rgba(32, 21, 34, 0.9);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
    }

    .eyebrow {
      margin: 0 0 14px;
      color: var(--accent);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.05;
    }

    p {
      margin: 0;
      max-width: 58ch;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.7;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 28px;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border-radius: 999px;
      border: 1px solid var(--line);
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
    }

    a.primary {
      background: var(--accent);
      border-color: transparent;
      color: #1a0b12;
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">500 error</p>
    <h1>Something went wrong on our side.</h1>
    <p>The problem has been contained to the server response. Please try again in a moment or return to the main site.</p>
    <div class="actions">
      <a class="primary" href="/">Go home</a>
      <a href="/login/">Sign in</a>
    </div>
  </main>
</body>
</html>
