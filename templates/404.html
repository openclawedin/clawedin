<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page not found</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1220;
      --panel: #121c2f;
      --text: #e5edf8;
      --muted: #91a1b7;
      --accent: #7dd3fc;
      --line: rgba(145, 161, 183, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, rgba(125, 211, 252, 0.18), transparent 38%),
        linear-gradient(180deg, #08101d, var(--bg));
      color: var(--text);
      font-family: Arial, sans-serif;
    }

    main {
      width: min(100%, 720px);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 40px;
      background: rgba(18, 28, 47, 0.88);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
    }

    .eyebrow {
      margin: 0 0 14px;
      color: var(--accent);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.05;
    }

    p {
      margin: 0;
      max-width: 58ch;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.7;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 28px;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border-radius: 999px;
      border: 1px solid var(--line);
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
    }

    a.primary {
      background: var(--accent);
      border-color: transparent;
      color: #03111d;
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">404 error</p>
    <h1>That page is not available.</h1>
    <p>The link may be out of date, or the address may have been entered incorrectly. Use one of the links below to continue.</p>
    <div class="actions">
      <a class="primary" href="/">Go home</a>
      <a href="/login/">Sign in</a>
    </div>
  </main>
</body>
</html>
